# afchat_lab — "124" benchmark configuration
# Goal: QA over real Hebrew aircraft manuals (ינשוף green data/limits + red/yellow
# emergency procedures). These docs are large and table-heavy — a stress test for the
# agent's long-document handling (search_files + whole-file reads).

paths:
  corpus_dir: corpus_124
  testset: testset/questions_124.json
  results_dir: results_124
  lmstudio_mcp_json: ~/.lmstudio/mcp.json
  mcp_server_name: filesystem

# The AGENT — model, system prompt, tool contracts, runtime knobs, and context
# window — is defined entirely by this package, the single source of truth shared
# with the Aristo app. This config only supplies the test ENVIRONMENT (corpus,
# testset, judge, backend, and which models to run).
package: ../packages/gemma4-qa

# Runtime backend: Ollama, native /api/chat exactly as Aristo does (the OpenAI /v1
# shim doesn't route the custom gemma renderer). Just `ollama serve` — no
# load/unload, Ollama auto-loads on first request.
ollama:
  base_url: http://localhost:11434
  request_timeout_s: 180

judge:
  model: claude-sonnet-4-6
  log_level: INFO

# Candidate models under test. IDs are Ollama tags (`ollama list`).
models:
  - id: gemma-4-e4b:latest
    label: gemma-4-e4b
  # Hosted reference candidate — driven via the Claude Agent SDK (not Ollama).
  # provider: claude makes the harness use Claude's own read-only file tools.
  # A strong-model baseline to calibrate the local model.
  - id: claude-sonnet-4-6
    label: claude-sonnet-ref
    provider: claude
