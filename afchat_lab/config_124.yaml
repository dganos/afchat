# afchat_lab — "124" benchmark configuration
# Goal: QA over real Hebrew aircraft manuals (ינשוף green data/limits + red/yellow
# emergency procedures). These docs are large and table-heavy — a stress test for the
# agent's long-document handling (search_files + whole-file reads).

paths:
  corpus_dir: corpus_124
  testset: testset/questions_124.json
  results_dir: results_124
  lmstudio_mcp_json: ~/.lmstudio/mcp.json
  mcp_server_name: filesystem

lmstudio:
  base_url: http://localhost:1234/v1
  api_key: lm-studio
  request_timeout_s: 180
  manage_models: true
  # These manuals are far larger than a single context window; the agent must rely on
  # search_files to locate passages rather than reading whole files.
  context_length: 16384

agent:
  max_steps: 8
  temperature: 0
  max_tool_result_chars: 16000
  tool_allowlist:
    - list_directory
    - read_text_file
    - search_files

judge:
  model: claude-sonnet-4-6
  log_level: INFO

# Hebrew-capable, tool-supporting candidate models.
models:
  - id: dictalm-3.0-nemotron-12b-instruct
    label: dictalm3-12b
  - id: google/gemma-4-e4b
    label: gemma-4-e4b
  - id: qwen/qwen3-4b
    label: qwen3-4b
