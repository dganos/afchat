<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>afchat_lab // doc-qa benchmark</title>
<style>
  :root{
    --bg:#0a0b0e; --panel:#101319; --panel2:#0d1015; --line:#1b2029; --line2:#272d39;
    --txt:#e7ebf2; --dim:#79808d; --dim2:#4d535e;
    --amber:#ffb454; --amber-d:#f0972a; --lime:#8be34d; --red:#ff6b6b; --cyan:#57c7ff; --violet:#b48cff;
    --mono:"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --disp:"Futura","Avenir Next Condensed","Avenir Next",sans-serif;
    --body:"Avenir Next","Helvetica Neue",-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt); font-family:var(--body); font-size:14px;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px),
      radial-gradient(120% 90% at 80% -10%, rgba(255,180,84,.06), transparent 60%);
    background-size:34px 34px,34px 34px,100% 100%;
    background-position:center top;
  }
  body::after{ /* faint vignette + grain feel */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
    background:radial-gradient(120% 120% at 50% 30%,transparent 60%,rgba(0,0,0,.55));
  }
  .wrap{position:relative;z-index:2;max-width:1320px;margin:0 auto;padding:0 22px 60px}

  /* ---------- header ---------- */
  header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;
    padding:26px 0 16px;border-bottom:1px solid var(--line2)}
  .brand{display:flex;flex-direction:column;gap:4px}
  .brand h1{font-family:var(--disp);font-weight:600;font-size:30px;letter-spacing:.14em;
    margin:0;text-transform:uppercase;color:var(--txt)}
  .brand h1 b{color:var(--amber);font-weight:600}
  .brand .sub{font-family:var(--mono);font-size:11px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase}
  .stats{display:flex;gap:10px;font-family:var(--mono);font-size:11px}
  .pill{border:1px solid var(--line2);background:var(--panel);padding:7px 11px;
    display:flex;gap:8px;align-items:center;letter-spacing:.06em}
  .pill .k{color:var(--dim2);text-transform:uppercase}
  .pill .v{color:var(--txt)}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--dim2);box-shadow:0 0 0 0 rgba(0,0,0,0)}
  .dot.on{background:var(--lime);box-shadow:0 0 8px var(--lime)}
  .dot.run{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse 1s infinite}
  .statswrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .mempill{border:1px solid var(--line2);background:var(--panel);padding:7px 11px;display:flex;
    gap:8px;align-items:center;font-family:var(--mono);font-size:11px;letter-spacing:.06em}
  .mempill .k{color:var(--dim2);text-transform:uppercase}
  .mempill .v{color:var(--txt)} .mempill .v .dim2{color:var(--dim2)}
  .membar{width:96px;height:8px;border-radius:2px;background:var(--line);overflow:hidden;
    border:1px solid var(--line2);box-shadow:inset 0 0 4px rgba(0,0,0,.5)}
  .membar i{display:block;height:100%;width:0;background:var(--lime);
    transition:width .5s ease,background .5s ease}
  @keyframes pulse{50%{opacity:.35}}

  /* ---------- tabs ---------- */
  nav{display:flex;gap:2px;margin:18px 0 22px}
  nav button{font-family:var(--mono);font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    background:transparent;color:var(--dim);border:1px solid transparent;border-bottom:1px solid var(--line2);
    padding:11px 18px;cursor:pointer;transition:.15s}
  nav button:hover{color:var(--txt)}
  nav button.active{color:var(--bg);background:var(--amber);border-color:var(--amber)}

  .panel{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line2)}
  .panel-h{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--dim);padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .panel-h .tag{color:var(--amber)}
  .timer{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em;margin-left:auto}

  /* ---------- control ---------- */
  .grid2{display:grid;grid-template-columns:380px 1fr;gap:18px}
  .form{padding:16px}
  .field{margin-bottom:20px}
  .field>label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--dim);margin-bottom:9px}
  .models{display:flex;flex-direction:column;gap:7px}
  .mrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);
    background:#0b0e13;cursor:pointer;transition:.12s;font-family:var(--mono);font-size:12.5px}
  .mrow:hover{border-color:var(--line2)}
  .mrow.sel{border-color:var(--amber);background:rgba(255,180,84,.06)}
  .mrow .box{width:14px;height:14px;border:1px solid var(--dim2);display:grid;place-items:center;flex:0 0 auto}
  .mrow.sel .box{border-color:var(--amber);background:var(--amber);color:#000}
  .mrow .box svg{width:10px;height:10px;display:none}
  .mrow.sel .box svg{display:block}
  .mrow .id{color:var(--dim);margin-left:auto;font-size:10.5px}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--dim);
    border:1px solid var(--line);padding:8px 11px;cursor:pointer;user-select:none}
  .opt.on{color:var(--txt);border-color:var(--cyan)}
  .opt .sw{width:26px;height:14px;border-radius:8px;background:var(--line2);position:relative;transition:.15s}
  .opt.on .sw{background:var(--cyan)}
  .opt .sw::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;
    background:#fff;transition:.15s}
  .opt.on .sw::after{left:14px}
  input[type=number]{width:80px;background:#0b0e13;border:1px solid var(--line2);color:var(--txt);
    font-family:var(--mono);padding:8px 10px}
  .preset-btn{font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:8px 11px;
    background:transparent;border:1px solid var(--line2);color:var(--dim);cursor:pointer;transition:.15s}
  .preset-btn:hover{color:var(--txt);border-color:var(--dim)}
  .preset-btn.active{border-color:var(--amber);color:var(--amber)}
  .judgebox{font-family:var(--mono);font-size:12px;color:var(--dim);border:1px solid var(--violet);
    background:rgba(180,140,255,.07);padding:11px 13px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .judgebox b{color:var(--violet)}
  .judgebox .note{color:var(--dim2);font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-left:auto}
  .launch{width:100%;font-family:var(--disp);letter-spacing:.18em;text-transform:uppercase;font-size:16px;
    background:var(--amber);color:#0a0b0e;border:none;padding:15px;cursor:pointer;font-weight:600;transition:.15s}
  .launch:hover{background:#ffc274}
  .launch:disabled{background:var(--line2);color:var(--dim);cursor:not-allowed}
  .runbtns{display:flex;gap:10px}
  .runbtns .launch{flex:1}
  .stop{font-family:var(--disp);letter-spacing:.16em;text-transform:uppercase;font-size:14px;
    background:transparent;color:var(--red);border:1px solid var(--red);padding:15px 20px;cursor:pointer;transition:.15s}
  .stop:hover:not(:disabled){background:var(--red);color:#0a0b0e}
  .stop:disabled{border-color:var(--line2);color:var(--dim2);cursor:not-allowed}
  .hint{font-family:var(--mono);font-size:10.5px;color:var(--dim2);margin-top:9px;line-height:1.5}

  /* ---------- console ---------- */
  .console{font-family:var(--mono);font-size:12px;line-height:1.65;padding:14px 16px;height:560px;
    overflow:auto;background:#070809;white-space:pre-wrap;word-break:break-word}
  .console .h{color:var(--amber);font-weight:600}
  .console .hdr{color:var(--amber);font-weight:600}
  .console .cmd{color:var(--violet)}
  .console .q{color:var(--cyan)}
  .console .a{color:var(--txt)}
  .console .tool{color:#6aa0c0}
  .console .think{color:var(--dim2);font-style:italic}
  .console .ok{color:var(--lime)}
  .console .bad{color:var(--red)}
  .console .par{color:var(--amber-d)}
  .console .dim{color:var(--dim)}
  .console::-webkit-scrollbar{width:9px}
  .console::-webkit-scrollbar-thumb{background:var(--line2)}

  /* ---------- leaderboard ---------- */
  .bar-row{display:grid;grid-template-columns:42px 150px 1fr 88px 120px 70px 90px;gap:14px;align-items:center;
    padding:15px 18px;border-bottom:1px solid var(--line)}
  .bar-row:last-child{border-bottom:none}
  .rank{font-family:var(--disp);font-size:26px;color:var(--dim2);text-align:center}
  .bar-row.first .rank{color:var(--amber)}
  .mname{font-family:var(--mono);font-size:13px;color:var(--txt)}
  .mname small{display:block;color:var(--dim2);font-size:10px;margin-top:2px}
  .track{height:12px;background:#0b0e13;border:1px solid var(--line2);position:relative;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--amber-d),var(--amber));transition:width .9s cubic-bezier(.2,.9,.2,1)}
  .pct{font-family:var(--disp);font-size:24px;text-align:right;color:var(--txt)}
  .pct small{font-size:12px;color:var(--dim)}
  .chips{display:flex;gap:6px;font-family:var(--mono);font-size:11px}
  .chip{padding:3px 7px;border:1px solid var(--line2)}
  .chip.c{color:var(--lime)} .chip.p{color:var(--amber-d)} .chip.x{color:var(--red)}
  .steps{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:right}

  .selectbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
  select{background:#0b0e13;border:1px solid var(--line2);color:var(--txt);font-family:var(--mono);
    font-size:12px;padding:9px 11px}
  .empty{padding:60px 20px;text-align:center;color:var(--dim);font-family:var(--mono);font-size:12px}

  /* ---------- logs ---------- */
  /* run entries */
  .run-entry{border:1px solid var(--line2);margin-bottom:8px;background:var(--panel)}
  .run-entry.partial{opacity:.7}
  .run-head{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;
    font-family:var(--mono);font-size:12px;user-select:none}
  .run-head:hover{background:#0d1116}
  .run-chevron{color:var(--dim2);font-size:10px;transition:.15s;flex:0 0 auto}
  .run-entry.open .run-chevron{transform:rotate(90deg)}
  .run-date{color:var(--amber);letter-spacing:.06em;flex:0 0 auto}
  .run-models{color:var(--txt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .run-scores{display:flex;gap:8px;flex:0 0 auto}
  .run-score{font-family:var(--disp);font-size:16px;color:var(--txt)}
  .run-score small{font-family:var(--mono);font-size:10px;color:var(--dim)}
  .run-meta{color:var(--dim2);font-size:10.5px;flex:0 0 auto}
  .run-actions{display:flex;gap:6px;flex:0 0 auto;margin-left:auto}
  .run-btn{font-family:var(--mono);font-size:10px;padding:4px 9px;background:transparent;
    border:1px solid var(--line2);color:var(--dim);cursor:pointer;transition:.15s}
  .run-btn:hover{color:var(--txt);border-color:var(--dim)}
  .run-btn.del:hover{color:var(--red);border-color:var(--red)}
  .run-body{display:none;border-top:1px solid var(--line)}
  .run-entry.open .run-body{display:block}
  /* question rows inside a run */
  .qfilters{display:flex;gap:8px;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--line)}
  .qrow{border-bottom:1px solid var(--line);border-left:3px solid transparent}
  .qrow:last-child{border-bottom:none}
  .qrow.c{border-left-color:var(--lime)} .qrow.p{border-left-color:var(--amber-d)} .qrow.x{border-left-color:var(--red)}
  .qhead{display:grid;grid-template-columns:54px 120px 1fr 90px 52px 52px;gap:12px;align-items:center;
    padding:10px 14px;cursor:pointer;font-family:var(--mono);font-size:12px}
  .qhead:hover{background:#0d1116}
  .qhead .qid{color:var(--amber)} .qhead .qm{color:var(--dim)}
  .qhead .qq{color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .qhead .qv{text-align:right;text-transform:uppercase;letter-spacing:.08em}
  .qv.c{color:var(--lime)} .qv.p{color:var(--amber-d)} .qv.x{color:var(--red)}
  .qhead .qs{color:var(--dim);text-align:right}
  .qbody{display:none;padding:14px;border-top:1px solid var(--line);background:#070809}
  .qrow.open .qbody{display:block}
  .qbody dl{display:grid;grid-template-columns:110px 1fr;gap:10px 18px;font-size:13px}
  .qbody dt{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);padding-top:2px}
  .qbody dd{margin:0;line-height:1.6}
  .qbody .ans{font-family:var(--mono);font-size:12.5px;background:#0a0b0e;border:1px solid var(--line);
    padding:12px 14px;white-space:pre-wrap;word-break:break-word;max-height:320px;overflow-y:auto}
  .qbody .ref{color:var(--lime)}
  .judge-box{background:rgba(180,140,255,.05);border:1px solid rgba(180,140,255,.2);padding:12px 14px;font-size:13px;line-height:1.6}
  .judge-box .verdict-badge{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    padding:3px 8px;border:1px solid currentColor;margin-right:10px}
  .judge-box .verdict-badge.c{color:var(--lime)} .judge-box .verdict-badge.p{color:var(--amber-d)} .judge-box .verdict-badge.x{color:var(--red)}

  /* ---------- corpus ---------- */
  .corp{display:grid;grid-template-columns:300px 1fr;gap:18px}
  .doclist{display:flex;flex-direction:column}
  .docitem{padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;transition:.12s}
  .docitem:hover{background:#0d1116}
  .docitem.sel{background:rgba(255,180,84,.07);border-left:3px solid var(--amber)}
  .docitem .t{font-family:var(--mono);font-size:12.5px;color:var(--txt)}
  .docitem .m{font-family:var(--mono);font-size:10px;color:var(--dim2);margin-top:3px}
  .docview{padding:22px 26px;height:640px;overflow:auto;line-height:1.7}
  .docview h1{font-family:var(--disp);letter-spacing:.06em;font-size:26px;color:var(--amber);margin:.2em 0 .6em}
  .docview h2{font-family:var(--mono);font-size:13px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--cyan);border-bottom:1px solid var(--line);padding-bottom:6px;margin:1.6em 0 .7em}
  .docview h3{font-family:var(--body);font-size:15px;color:var(--txt);margin:1.1em 0 .4em}
  .docview p,.docview li{color:#cdd3dd;font-size:13.5px}
  .docview table{border-collapse:collapse;width:100%;margin:1em 0;font-family:var(--mono);font-size:11.5px}
  .docview th,.docview td{border:1px solid var(--line2);padding:6px 9px;text-align:left}
  .docview th{background:#0d1116;color:var(--amber-d)}
  .docview code{font-family:var(--mono);color:var(--amber)}
  .docview strong{color:var(--txt)}
  .hidden{display:none}
  /* ---------- log renderer ---------- */
  .log-block{border-bottom:1px solid var(--line);padding:14px 18px}
  .log-block:last-child{border-bottom:none}
  .log-run-header{background:rgba(255,180,84,.06);padding:12px 18px;border-bottom:1px solid var(--line2);
    font-family:var(--mono);font-size:12px;color:var(--amber);letter-spacing:.08em}
  .log-q-header{display:flex;gap:14px;align-items:baseline;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line)}
  .log-q-id{color:var(--amber);font-weight:600;font-size:13px}
  .log-q-meta{color:var(--dim2);font-size:10.5px}
  .log-label{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
    padding:2px 7px;border:1px solid currentColor;margin-right:8px;vertical-align:middle;opacity:.8}
  .log-label.q{color:var(--cyan)} .log-label.a{color:var(--txt)} .log-label.j{color:var(--violet)}
  .log-label.t{color:#6aa0c0} .log-label.r{color:var(--lime)}
  .log-section{margin:8px 0;line-height:1.65}
  .log-text{white-space:pre-wrap;word-break:break-word}
  .log-think{color:var(--dim2);font-style:italic;font-size:11px;line-height:1.55;
    background:rgba(0,0,0,.3);border-left:2px solid var(--line2);padding:8px 12px;margin:6px 0;white-space:pre-wrap;word-break:break-word}
  .log-tool-line{color:#6aa0c0;font-size:11.5px}
  .log-verdict{display:flex;align-items:flex-start;gap:10px;margin-top:10px;padding:10px 12px;border:1px solid var(--line2)}
  .log-verdict.c{border-color:rgba(139,227,77,.3);background:rgba(139,227,77,.04)}
  .log-verdict.p{border-color:rgba(240,151,42,.3);background:rgba(240,151,42,.04)}
  .log-verdict.x{border-color:rgba(255,107,107,.3);background:rgba(255,107,107,.04)}
  .log-verdict-badge{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    padding:3px 8px;border:1px solid currentColor;white-space:nowrap;flex:0 0 auto}
  .log-verdict.c .log-verdict-badge{color:var(--lime)} .log-verdict.p .log-verdict-badge{color:var(--amber-d)} .log-verdict.x .log-verdict-badge{color:var(--red)}
  .log-verdict-body{font-size:12.5px;line-height:1.55}
  .log-verdict-judge{color:var(--dim);font-size:11px;margin-top:4px}
  .log-timing{font-family:var(--mono);font-size:10.5px;color:var(--dim2);margin-left:auto;white-space:nowrap;flex:0 0 auto;padding-top:2px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:50;
    font-family:var(--mono);font-size:12px;background:var(--panel);border:1px solid var(--amber);
    color:var(--txt);padding:12px 18px;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <h1>AFCHAT<b>_</b>LAB</h1>
      <div class="sub">Document-QA Benchmark · LM Studio × MCP × Claude Judge</div>
    </div>
    <div class="statswrap">
      <div class="mempill" id="mem" title="reading memory…">
        <span class="k">ram</span>
        <span class="membar"><i id="memfill"></i></span>
        <span class="v"><b id="memfree">—</b> free<span class="dim2"> / <span id="memtotal">—</span></span></span>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </header>

  <nav id="tabs">
    <button data-tab="control" class="active">Control</button>
    <button data-tab="leaderboard">Leaderboard</button>
    <button data-tab="questions">Logs</button>
    <button data-tab="corpus">Corpus</button>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--dim)">
      <span style="letter-spacing:.1em;text-transform:uppercase">Benchmark</span>
      <div id="langbtns" style="display:flex;gap:4px"></div>
    </div>
  </nav>

  <!-- CONTROL -->
  <section id="control">
    <div class="grid2">
      <div class="panel">
        <div class="panel-h">Run Configuration <span class="tag" id="cfgtag"></span></div>
        <div class="form">
          <div class="field">
            <label>Models under test</label>
            <div class="models" id="modellist"></div>
          </div>
          <div class="field">
            <label>Judge</label>
            <div class="judgebox" id="judgebox">Claude Agent SDK · <b id="judgemodel">claude-sonnet-4-6</b>
              <span class="note">required — no Claude, no test</span></div>
          </div>
          <div class="field">
            <label>Questions limit</label>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <input type="number" id="limit" min="0" value="0" />
              <button class="preset-btn active" data-val="0">All</button>
              <button class="preset-btn" data-val="10">10Q short</button>
              <button class="preset-btn" data-val="5">5Q smoke</button>
            </div>
          </div>
          <div class="field">
            <label>Options</label>
            <div class="opts">
              <div class="opt on" id="opt-manage"><span class="sw"></span> Load/unload via lms</div>
            </div>
          </div>
          <div class="runbtns">
            <button class="launch" id="launch">▶ Launch Run</button>
            <button class="stop" id="stop" disabled>■ Stop</button>
          </div>
          <div class="hint" id="launchhint"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-h">Live Console <span class="tag" id="constag">idle</span><span id="curmodel" style="font-family:var(--mono);font-size:11px;color:var(--amber);margin-left:10px;letter-spacing:.06em"></span><span class="timer hidden" id="timer"></span><span id="consbench" style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.08em"></span></div>
        <div class="console" id="console"><span class="dim">// awaiting launch…</span></div>
      </div>
    </div>
  </section>

  <!-- LEADERBOARD -->
  <section id="leaderboard" class="hidden">
    <div class="selectbar">
      <span style="font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em">VIEW</span>
      <select id="lbselect"></select>
      <span id="lbmeta" style="font-family:var(--mono);font-size:11px;color:var(--dim)"></span>
      <span id="lbcurmodel" style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--amber);letter-spacing:.06em"></span>
    </div>
    <div class="panel"><div id="lbbody"></div></div>
  </section>

  <!-- LOGS -->
  <section id="questions" class="hidden">
    <div id="runslist"></div>
  </section>

  <!-- LOG VIEWER MODAL -->
  <div id="logmodal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.88);overflow:auto;padding:30px">
    <div style="max-width:960px;margin:0 auto;background:var(--panel);border:1px solid var(--line2)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:1">
        <span id="logmodaltitle" style="font-family:var(--mono);font-size:12px;color:var(--amber)"></span>
        <button onclick="$('#logmodal').style.display='none'" style="font-family:var(--mono);font-size:12px;background:transparent;border:1px solid var(--line2);color:var(--dim);padding:6px 12px;cursor:pointer">✕ Close</button>
      </div>
      <div id="logcontent" style="font-family:var(--mono);font-size:12px;line-height:1.7;padding:0;overflow-y:auto;color:var(--txt);margin:0"></div>
    </div>
  </div>

  <!-- CORPUS -->
  <section id="corpus" class="hidden">
    <div class="corp">
      <div class="panel doclist" id="doclist"></div>
      <div class="panel"><div class="docview" id="docview"><div class="empty">Select a document</div></div></div>
    </div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t); if(c)e.className=c; if(h!=null)e.innerHTML=h; return e;};
const VMAP = {correct:'c', partial:'p', incorrect:'x'};
let STATE=null, QCACHE=null, RUNCACHE={};
let _activeConfig='config.yaml', _loadedCorpusConfig=null;
const CFG_LABEL = {'config.yaml':'EN 🇪🇺','config_he.yaml':'HE 🇮🇱'};
const isHebrew = ()=> _activeConfig==='config_he.yaml';

function toast(msg){const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600);}

async function loadState(){
  STATE = await (await fetch('/api/state')).json();
  renderStats(); renderModels(); renderRunSelectors();
  $('#cfgtag').textContent = 'ctx '+STATE.lmstudio.context_length;
  if(STATE.judge && STATE.judge.model) $('#judgemodel').textContent = STATE.judge.model;
  // reflect active benchmark in subtitle
  const benchLabel = CFG_LABEL[_activeConfig]||_activeConfig;
  $('.sub').textContent = `Document-QA Benchmark · ${benchLabel} · LM Studio × MCP × Claude Judge`;
  // console panel title
  $('#consbench').textContent = benchLabel;
}

function renderStats(){
  const s=$('#stats'); s.innerHTML='';
  const running = STATE.run_status==='running';
  const items=[
    ['server', STATE.lmstudio.base_url.replace('http://',''), running?'run':'on'],
    ['judge', STATE.judge.model, 'on'],
    ['testset', STATE.testset.count+' Q', 'on'],
    ['runs', STATE.runs.length, STATE.runs.length?'on':''],
  ];
  for(const [k,v,d] of items){
    const p=el('div','pill'); p.innerHTML=`<span class="dot ${d}"></span><span class="k">${k}</span><span class="v">${v}</span>`;
    s.appendChild(p);
  }
}

function renderModels(){
  const list=$('#modellist'); list.innerHTML='';
  for(const m of STATE.models){
    const r=el('div','mrow sel');
    r.innerHTML=`<span class="box"><svg viewBox="0 0 10 10"><path d="M1 5l3 3 5-7" stroke="#000" stroke-width="1.6" fill="none"/></svg></span>
      <span class="lbl">${m.label}</span><span class="id">${m.id}</span>`;
    r.dataset.label=m.label;
    r.onclick=()=>{r.classList.toggle('sel'); updateHint();};
    list.appendChild(r);
  }
}

$('#opt-manage').onclick=()=>{$('#opt-manage').classList.toggle('on'); updateHint();};
$('#limit').oninput=()=>{
  document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
  const cur=+$('#limit').value;
  const match=[...document.querySelectorAll('.preset-btn')].find(b=>+b.dataset.val===cur);
  if(match) match.classList.add('active');
  updateHint();
};
document.querySelectorAll('.preset-btn').forEach(b=>b.onclick=()=>{
  $('#limit').value=b.dataset.val;
  document.querySelectorAll('.preset-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  updateHint();
});

function gatherCfg(){
  const models=[...document.querySelectorAll('.mrow.sel')].map(r=>r.dataset.label);
  return {
    models, limit:+$('#limit').value||0,
    no_manage: !$('#opt-manage').classList.contains('on'),
  };
}
function updateHint(){
  const c=gatherCfg();
  const n = c.limit||STATE.testset.count;
  $('#launchhint').textContent =
    `${c.models.length} model(s) × ${n} question(s) = ${c.models.length*n} evals · judge=claude`
    + (c.no_manage?' · no-manage':'');
}

$('#launch').onclick=async()=>{
  const cfg=gatherCfg();
  if(!cfg.models.length){toast('select at least one model'); return;}
  $('#launch').disabled=true; setConsTag('running');
  resetConsole();
  try{
    const r=await fetch('/api/run',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(cfg)});
    if(!r.ok){const e=await r.json(); toast(e.detail||'launch failed'); $('#launch').disabled=false; setConsTag('error'); return;}
    streamRun();
  }catch(e){toast('launch error'); $('#launch').disabled=false;}
};

let streaming=false;
let _curModel=null, _liveInterval=null;

function setConsTag(txt){ $('#constag').textContent=txt; }

function setCurModel(name){
  _curModel=name;
  const txt = name ? '● '+name : '';
  ['#curmodel','#lbcurmodel'].forEach(id=>{ const s=$(id); if(s) s.textContent=txt; });
}

function startLivePolling(){
  if(_liveInterval) return;
  _liveInterval=setInterval(async()=>{
    try{
      const res=await fetch('/api/run/live');
      if(!res.ok){ stopLivePolling(); return; }   // run ended — clean up immediately
      const d=await res.json();
      const activeTab=$('#tabs button.active')?.dataset?.tab;
      if(activeTab==='leaderboard') renderLeaderboard('run-live.json', d);
      if(activeTab==='questions')   renderQuestions('run-live.json', d);
      injectLiveOption();
    }catch(e){ stopLivePolling(); }
  }, 3000);
}

function stopLivePolling(){
  clearInterval(_liveInterval); _liveInterval=null;
  removeLiveOption();
  setCurModel(null);
}

function injectLiveOption(){
  for(const sel of ['#lbselect','#qselect']){
    const s=$(sel);
    if(!s.querySelector('option[value="run-live.json"]')){
      const o=el('option',null,'▶ LIVE (running…)'); o.value='run-live.json';
      s.insertBefore(o, s.firstChild);
      s.value='run-live.json';
    }
  }
}

function removeLiveOption(){
  for(const sel of ['#lbselect','#qselect']){
    const s=$(sel), o=s.querySelector('option[value="run-live.json"]');
    if(o){ const wasSelected=s.value==='run-live.json'; o.remove(); if(wasSelected&&s.options.length) s.value=s.options[0].value; }
  }
}

let _timerInterval=null, _timerStart=null;
function fmtElapsed(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
  return h>0 ? `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`
             : `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function startTimer(){
  _timerStart=Date.now(); $('#timer').classList.remove('hidden');
  _timerInterval=setInterval(()=>{ $('#timer').textContent=fmtElapsed(Date.now()-_timerStart); }, 1000);
}
function stopTimer(){
  clearInterval(_timerInterval); _timerInterval=null;
}

function classFor(line){
  const t=line.trim();
  if(t.startsWith('===')||t.startsWith('MCP tools')) return 'h';
  if(t.startsWith('$')) return 'cmd';
  if(/^q\d+ ·/.test(t)) return 'hdr';
  if(t.startsWith('Q:')) return 'q';
  if(t.startsWith('A:')) return 'a';
  if(t.startsWith('·')) return 'think';
  if(t.startsWith('→')||t.startsWith('↳')) return 'tool';
  if(t.startsWith('ref:')||t.startsWith('----')||t.startsWith('__exit__')||t.startsWith('Saved')
     ||t.startsWith('->')||t.startsWith('Preflight')||t.startsWith('Unloading')||t.startsWith('loading')) return 'dim';
  if(/✗|INCORRECT|ABORT|Traceback|Error/.test(t)) return 'bad';
  if(/✓/.test(t)||(/CORRECT/.test(t)&&!/INCORRECT/.test(t))) return 'ok';
  if(/~|PARTIAL/.test(t)) return 'par';
  return 'a';
}
// Streamed console: append raw text chunks, keeping the in-progress (partial) line live.
let pending="", pendingSpan=null;
function resetConsole(){ $('#console').innerHTML=''; pending=""; pendingSpan=null; }
function finalizeLine(line){
  if(pendingSpan){ pendingSpan.remove(); pendingSpan=null; }
  $('#console').appendChild(el('span', classFor(line), escapeHtml(line)+'\n'));
}
function appendChunk(text){
  const c=$('#console'); let i=0;
  while(i<text.length){
    const nl=text.indexOf('\n', i);
    if(nl===-1){ pending+=text.slice(i); break; }
    pending+=text.slice(i,nl);
    const mm=pending.trim().match(/^===\s+(.+?)\s+\(/); if(mm) setCurModel(mm[1]);
    finalizeLine(pending); pending=""; i=nl+1;
  }
  if(pending.length){
    if(!pendingSpan){ pendingSpan=el('span','a',''); c.appendChild(pendingSpan); }
    pendingSpan.className=classFor(pending); pendingSpan.textContent=pending;
  } else if(pendingSpan){ pendingSpan.remove(); pendingSpan=null; }
  c.scrollTop=c.scrollHeight;
}
function escapeHtml(s){return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));}

$('#stop').onclick=async()=>{
  $('#stop').disabled=true; setConsTag('stopping…');
  try{ await fetch('/api/run/stop',{method:'POST'}); toast('stopping run…'); }
  catch(e){ toast('stop failed'); }
};

function streamRun(){
  if(streaming) return;
  // Defensively close any lingering EventSource before opening a new one.
  if(window._es){ try{ window._es.close(); }catch(e){} window._es=null; }
  if(window._wd){ clearInterval(window._wd); window._wd=null; }
  streaming=true; setConsTag('running'); $('#launch').disabled=true; $('#stop').disabled=false;
  resetConsole(); startTimer(); startLivePolling();
  let _lastMsg=Date.now();
  const es=new EventSource('/api/run/stream');
  window._es=es;
  es.onmessage=e=>{
    _lastMsg=Date.now();
    const txt=JSON.parse(e.data);
    if(txt) appendChunk(txt);           // keepalive comments arrive as empty strings — skip
  };
  es.addEventListener('done',async e=>{
    es.close(); if(window._es===es) window._es=null;
    if(window._wd){ clearInterval(window._wd); window._wd=null; }
    streaming=false; stopTimer(); stopLivePolling();
    $('#launch').disabled=false; $('#stop').disabled=true; setConsTag('done');
    toast('run complete');
    await loadState();
    await loadPartialRuns();
    if(STATE.runs[0]){ $('#lbselect').value=STATE.runs[0].name; renderLeaderboard(STATE.runs[0].name); }
    if($('#tabs button.active')?.dataset?.tab==='questions') renderRunsList();
  });
  es.onerror=()=>{
    es.close(); if(window._es===es) window._es=null;
    if(window._wd){ clearInterval(window._wd); window._wd=null; }
    streaming=false; stopTimer(); stopLivePolling();
    $('#launch').disabled=false; $('#stop').disabled=true; setConsTag('disconnected');
    loadState().then(()=>{ loadPartialRuns().then(()=>{ if($('#tabs button.active')?.dataset?.tab==='questions') renderRunsList(); }); });
  };
  // Watchdog: keepalives arrive every 0.4s, so >15s of true silence means a
  // dead connection — reconnect. (Slow generation still sends keepalives.)
  window._wd=setInterval(async()=>{
    if(!streaming){ clearInterval(window._wd); window._wd=null; return; }
    if(Date.now()-_lastMsg > 15000){
      try{ es.close(); }catch(e){}
      if(window._es===es) window._es=null;
      streaming=false; stopLivePolling(); clearInterval(window._wd); window._wd=null;
      $('#launch').disabled=false; $('#stop').disabled=true;
      setConsTag('reconnecting…');
      setTimeout(()=>{ if(!streaming) streamRun(); }, 500);
    }
  }, 3000);
}

// htop-style live RAM meter. Polls the same "available memory" figure the model
// picker uses, so "free" reflects what a model load will actually find.
function fmtG(b){ return (b/1073741824).toFixed(1)+'G'; }
async function pollMem(){
  try{
    const m = await (await fetch('/api/memory')).json();
    if(!m.total) return;
    const usedPct = Math.max(0, Math.min(100, m.used/m.total*100));
    const fill = $('#memfill');
    fill.style.width = usedPct.toFixed(1)+'%';
    fill.style.background = usedPct>=88 ? 'var(--red)' : usedPct>=70 ? 'var(--amber)' : 'var(--lime)';
    $('#memfree').textContent = fmtG(m.free);
    $('#memtotal').textContent = fmtG(m.total);
    $('#mem').title = `total ${fmtG(m.total)} · used ${fmtG(m.used)} (${usedPct.toFixed(0)}%) · free ${fmtG(m.free)}`;
  }catch(e){}
}
setInterval(pollMem, 2000); pollMem();

// Auto-attach to ANY running job (even one started elsewhere), without a manual reload.
setInterval(async()=>{
  if(streaming) return;
  try{ const s=await (await fetch('/api/state')).json();
    if(s.run_status==='running') streamRun();
  }catch(e){}
}, 2500);

/* ---------- run selectors shared by leaderboard + questions ---------- */
function renderRunSelectors(){
  const validNames = new Set([...STATE.runs.map(r=>r.name), 'aggregate']);
  // leaderboard selector — has "Best of all runs" aggregate option
  const lb=$('#lbselect');
  const lbCur = validNames.has(lb.value) ? lb.value : 'aggregate';
  lb.innerHTML='';
  if(STATE.runs.length){
    const agg=el('option',null,'★ Best of all runs'); agg.value='aggregate'; lb.appendChild(agg);
    for(const r of STATE.runs){ const o=el('option',null,`${r.name.replace('run-','').replace('.json','')}  ·  ${r.models.map(m=>m.label).join(', ').slice(0,40)}`); o.value=r.name; lb.appendChild(o); }
    lb.value=lbCur;
  } else { lb.appendChild(el('option',null,'— no runs yet —')); }

  lb.onchange=e=>renderLeaderboard(e.target.value);
  if(STATE.runs.length){ renderLeaderboard(lbCur); }
  else { $('#lbbody').innerHTML='<div class="empty">No runs yet — launch one from the Control tab.</div>'; }
}

async function getRun(name, data){
  if(data) return data;
  if(RUNCACHE[name]) return RUNCACHE[name];
  const url = name==='run-live.json' ? '/api/run/live'
            : name==='aggregate'     ? '/api/runs/aggregate'
            : '/api/runs/'+name;
  const d=await (await fetch(url)).json();
  if(name!=='run-live.json' && name!=='aggregate') RUNCACHE[name]=d;
  return d;
}

async function renderLeaderboard(name, data){
  if(!name) return;
  const d=await getRun(name, data);
  const board=[...d.models].sort((a,b)=>b.pct-a.pct);
  const metaLabel = d.aggregate ? `best of ${STATE.runs.length} run(s) · ${board.length} model(s)`
                                : `${d.started} · ${board.length} model(s)`+(d.live?' · LIVE':'');
  $('#lbmeta').textContent = metaLabel;
  const body=$('#lbbody'); body.innerHTML='';
  const max=Math.max(1,...board.map(m=>m.pct));
  board.forEach((m,i)=>{
    const row=el('div','bar-row'+(i===0?' first':''));
    const liveTag = m.live ? ' <span style="font-size:10px;color:var(--amber);animation:pulse 1s infinite">▶ LIVE</span>' : '';
    const nLabel = m.n_scored != null && m.n_scored !== m.n
      ? `${m.n_scored}/${m.n}Q scored` : `${m.n||'?'}Q`;
    const progress = m.live && m.n
      ? ` <span style="color:var(--dim2);font-size:10px">${m.n}/${STATE?.testset?.count||'?'} Q</span>`
      : m.best_run
      ? ` <span style="color:var(--dim2);font-size:10px">${m.best_run.replace('run-','').replace('.json','')}</span>`
      : ` <span style="color:var(--dim2);font-size:10px">${nLabel}</span>`;
    const fmtDur = s => s>=60 ? `${Math.floor(s/60)}m ${s%60}s` : `${s}s`;
    const timeCell = m.duration_s != null
      ? `${fmtDur(m.duration_s)}<br><span style="color:var(--dim2)">${m.avg_q_s}s ±${m.std_q_s}s</span>`
      : `<span style="color:var(--dim2)">—</span>`;
    row.innerHTML=`
      <div class="rank">${String(i+1).padStart(2,'0')}</div>
      <div class="mname">${m.label}${liveTag}<small>${m.id||''}${progress}</small></div>
      <div class="track"><div class="fill" style="width:0%"></div></div>
      <div class="pct">${m.pct}<small>%</small></div>
      <div class="chips">
        <span class="chip c">${m.correct}✓</span>
        <span class="chip p">${m.partial}~</span>
        <span class="chip x">${m.incorrect}✗</span>
        ${m.model_errors ? `<span class="chip x" title="model crashed" style="opacity:.7">${m.model_errors}💥</span>` : ''}
        ${m.judge_errors ? `<span class="chip" title="answered but judge timed out — excluded from score" style="color:var(--dim);opacity:.7">${m.judge_errors}⚖</span>` : ''}
      </div>
      <div class="steps">${m.avg_steps}<br><span style="color:var(--dim2)">steps</span></div>
      <div class="steps">${timeCell}</div>`;
    body.appendChild(row);
    requestAnimationFrame(()=>{ setTimeout(()=>{ row.querySelector('.fill').style.width=(m.pct)+'%'; }, 60*i); });
  });
}

let _rlDebounce=null, _rlRunning=false;
function renderRunsList(){
  clearTimeout(_rlDebounce);
  _rlDebounce=setTimeout(_doRenderRunsList, 120);
}
async function _doRenderRunsList(){
  if(_rlRunning) return;
  _rlRunning=true;
  try{ await _renderRunsListInner(); }finally{ _rlRunning=false; }
}
async function _renderRunsListInner(){
  if(!QCACHE) try{ QCACHE=await (await fetch('/api/questions')).json(); }catch(e){}
  const qmap={}; (QCACHE?.questions||[]).forEach(q=>qmap[q.id]=q);

  const list=$('#runslist'); list.innerHTML='';

  const allRuns=[
    ...STATE.runs.map(r=>({type:'complete', ...r})),
    ...(window.__partialLogs||[]).map(l=>({type:'partial', name:l.name.replace('.log','.json'), logName:l.name, size:l.size, models:[]}))
  ];
  if(!allRuns.length){ list.innerHTML='<div class="empty">No runs yet — launch one from the Control tab.</div>'; return; }

  for(const run of allRuns){
    const entry=el('div','run-entry'+(run.type==='partial'?' partial':''));
    const dateStr=(run.name||'').replace('run-','').replace('.json','').replace(/(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})/,'$1-$2-$3 $4:$5:$6');
    const modelSummary=run.models.map(m=>`${m.label}${m.pct!=null?' '+m.pct+'%':''}`).join('  ·  ');
    const nQ=run.models.reduce((s,m)=>s+(m.n||0),0);

    let headInner=`<span class="run-chevron">▶</span>
      <span class="run-date">${dateStr}</span>
      <span class="run-models">${run.type==='partial'?'<span style="color:var(--dim2)">[partial]</span> '+((run.size/1024).toFixed(1))+'KB':modelSummary}</span>
      ${run.type==='complete'?`<span class="run-meta">${nQ}Q</span>`:''}
      <span class="run-actions">
        <button class="run-btn log-btn" data-log="${run.type==='partial'?run.logName:(run.name||'').replace('.json','.log')}">📋 log</button>
        ${run.type==='complete'
          ? `<button class="run-btn del" data-run="${run.name}">🗑</button>`
          : `<button class="run-btn del" data-log="${run.logName}">🗑</button>`}
      </span>`;

    const head=el('div','run-head'); head.innerHTML=headInner;
    const body=el('div','run-body');
    let loaded=false;

    head.onclick=async(e)=>{
      if(e.target.closest('.run-btn')) return;
      entry.classList.toggle('open');
      if(entry.classList.contains('open') && !loaded){
        loaded=true;
        if(run.type==='partial'){
          body.innerHTML='<div style="padding:20px;font-family:var(--mono);font-size:12px;color:var(--dim)">Partial run — no results data. Use 📋 log to view the raw output.</div>';
          return;
        }
        body.innerHTML='<div style="padding:14px;font-family:var(--mono);font-size:11px;color:var(--dim)">Loading…</div>';
        let d; try{ d=await getRun(run.name); }catch(ex){ body.innerHTML='<div class="empty">Failed to load run.</div>'; return; }
        body.innerHTML='';
        // filters bar
        const filters=el('div','qfilters');
        const modelOpts=['all',...d.models.map(m=>m.label)];
        const QF={model:'all',verdict:'all',difficulty:'all'};
        const rows=[]; d.models.forEach(m=>(m.rows||[]).forEach(r=>rows.push({...r,model:m.label})));
        const qlist=el('div');
        const applyF=()=>{
          qlist.innerHTML='';
          const filt=rows.filter(r=>(QF.model==='all'||r.model===QF.model)&&(QF.verdict==='all'||r.verdict===QF.verdict)&&(QF.difficulty==='all'||r.difficulty===QF.difficulty));
          if(!filt.length){qlist.innerHTML='<div style="padding:20px;text-align:center;font-family:var(--mono);font-size:12px;color:var(--dim)">No matching rows.</div>';return;}
          for(const r of filt){
            const q=qmap[r.id]||{}; const v=VMAP[r.verdict]||'x';
            const rtl=isHebrew()?' dir="rtl"':'';
            const elapsed=r.elapsed_s!=null?`${r.elapsed_s}s`:'—';
            const qrow=el('div','qrow '+v);
            const judgeHtml=`<div class="judge-box"><span class="verdict-badge ${v}">${r.verdict}</span>${escapeHtml(r.rationale||'(no rationale)')}<span style="font-family:var(--mono);font-size:10px;color:var(--dim);margin-left:12px">[${r.grader||'?'}]</span></div>`;
            qrow.innerHTML=`
              <div class="qhead">
                <span class="qid">${r.id}</span><span class="qm">${r.model}</span>
                <span class="qq"${rtl}>${escapeHtml(q.question||'')}</span>
                <span class="qv ${v}">${r.verdict}</span>
                <span class="qs">${r.steps}⟳</span><span class="qs">${elapsed}</span>
              </div>
              <div class="qbody"><dl${rtl}>
                <dt>Question</dt><dd>${escapeHtml(q.question||'')}</dd>
                <dt>Answer</dt><dd><div class="ans"${rtl}>${escapeHtml(r.answer||'(none)')}</div></dd>
                <dt>Judge</dt><dd>${judgeHtml}</dd>
                <dt>Reference</dt><dd class="ref"${rtl}>${escapeHtml(q.reference_answer||'')}</dd>
                <dt>Key facts</dt><dd>${(q.key_facts||[]).map(k=>'<code>'+escapeHtml(k)+'</code>').join(' ')}</dd>
                <dt>Meta</dt><dd style="font-family:var(--mono);font-size:11px;color:var(--dim)">doc:${r.source_doc} · finish:${r.finish} · tools:${r.n_tool_calls} · steps:${r.steps} · time:${elapsed}${r.error?'<br><span style="color:var(--red)">'+escapeHtml(r.error)+'</span>':''}</dd>
              </dl></div>`;
            qrow.querySelector('.qhead').onclick=()=>qrow.classList.toggle('open');
            qlist.appendChild(qrow);
          }
        };
        const mk=(key,opts,prefix)=>{const w=el('div');const s=el('select');opts.forEach(o=>{const op=el('option',null,prefix+o);op.value=o;s.appendChild(op);});s.value=QF[key];s.onchange=()=>{QF[key]=s.value;applyF();};w.appendChild(s);return w;};
        filters.appendChild(mk('model',modelOpts,'model: '));
        filters.appendChild(mk('verdict',['all','correct','partial','incorrect'],'verdict: '));
        filters.appendChild(mk('difficulty',['all','easy','medium','hard'],'diff: '));
        body.appendChild(filters); body.appendChild(qlist); applyF();
      }
    };

    head.querySelectorAll('.log-btn').forEach(btn=>btn.onclick=async()=>{
      const logName=btn.dataset.log;
      try{
        const r=await fetch('/api/logs/'+logName);
        if(!r.ok){toast('no log file for this run'); return;}
        $('#logmodaltitle').textContent=logName;
        $('#logcontent').innerHTML=renderLogText(await r.text());
        $('#logmodal').style.display='block';
      }catch(e){toast('failed to load log');}
    });
    head.querySelectorAll('.del').forEach(btn=>btn.onclick=async()=>{
      const isPartial = !!btn.dataset.log;
      const label = isPartial ? btn.dataset.log : btn.dataset.run;
      if(!confirm(`Delete ${label}?`)) return;
      let r;
      if(isPartial){
        r=await fetch('/api/logs/'+btn.dataset.log,{method:'DELETE'});
      } else {
        r=await fetch('/api/runs/'+btn.dataset.run,{method:'DELETE'});
        delete RUNCACHE[btn.dataset.run];
      }
      if(!r.ok){toast('delete failed');return;}
      toast('deleted'); await loadState(); await loadPartialRuns(); renderRunsList();
    });

    entry.appendChild(head); entry.appendChild(body); list.appendChild(entry);
  }
}

async function loadPartialRuns(){
  try{
    const logs=await (await fetch('/api/logs')).json();
    window.__partialLogs=logs.filter(l=>!l.has_json);
  }catch(e){}
}

// While the Logs tab is open, refresh the list every 5s so new/partial runs appear.
setInterval(async()=>{
  if($('#tabs button.active')?.dataset?.tab!=='questions') return;
  const prev=JSON.stringify(window.__partialLogs);
  await loadPartialRuns();
  if(JSON.stringify(window.__partialLogs)!==prev) renderRunsList();
}, 5000);

// keep renderQuestions as a no-op alias used by live polling
async function renderQuestions(name, data){ /* handled by renderRunsList now */ }

function renderLogText(raw){
  const lines = raw.split('\n');
  let html = '';
  let i = 0;

  const e = s => escapeHtml(s);
  const VMAP2 = {'✓':'c','~':'p','✗':'x'};

  while(i < lines.length){
    const line = lines[i]; const t = line.trim();

    // Run header === model (id) ===
    if(t.startsWith('===')){
      html += `<div class="log-run-header">${e(t)}</div>`;
      i++; continue;
    }

    // Question separator + header block
    if(t.startsWith('---') || /^q\d+\s·/.test(t)){
      if(t.startsWith('---')){ i++; continue; } // skip separator line
      // q01 · easy · doc.md
      const parts = t.split('·').map(s=>s.trim());
      const qid = parts[0]||'', diff = parts[1]||'', doc = parts[2]||'';
      // collect lines until next separator or model header
      i++;
      let questionText='', answerLines=[], thinkBlocks=[], toolLines=[], refText='', judgeRaw='', verdictLine='', judgeDetail='';
      let curThink=[];

      const flushThink=()=>{ if(curThink.length){ thinkBlocks.push(curThink.join('\n')); curThink=[]; } };

      while(i < lines.length){
        const l = lines[i]; const tt = l.trim();
        if(tt.startsWith('---') || /^q\d+\s·/.test(tt) || tt.startsWith('===')){
          flushThink(); break;
        }
        if(tt.startsWith('Q:')){ questionText = tt.slice(2).trim(); i++; continue; }
        if(/^·\s*think:/.test(tt)){ flushThink(); i++; continue; } // think summary — skip, we show full
        if(tt.startsWith('A:')){ flushThink(); answerLines.push(tt.slice(2).trim()); i++;
          // collect multi-line answer
          while(i < lines.length && lines[i].startsWith('  A:')){ answerLines.push(lines[i].trim().slice(2).trim()); i++; }
          continue;
        }
        if(tt.startsWith('ref:')){ flushThink(); refText=tt.slice(4).trim(); i++; continue; }
        if(tt.startsWith('judge raw:')){ judgeRaw=tt.slice(10).trim(); i++; continue; }
        if(tt.startsWith('→') || tt.startsWith('↳')){ flushThink(); toolLines.push(tt); i++; continue; }
        if(/^[✓✗~]/.test(tt)){ flushThink(); verdictLine=tt; i++; continue; }
        if(tt.startsWith('judge:') && verdictLine){ judgeDetail=tt.slice(6).trim(); i++; continue; }
        if(!answerLines.length && !tt.startsWith('loading') && tt){ curThink.push(l); }
        i++;
      }
      flushThink();

      let blockHtml = `<div class="log-block">`;
      blockHtml += `<div class="log-q-header"><span class="log-q-id">${e(qid)}</span><span class="log-q-meta">${e(diff)} · ${e(doc)}</span></div>`;

      if(questionText)
        blockHtml += `<div class="log-section"><span class="log-label q">Q</span><span class="log-text">${e(questionText)}</span></div>`;

      if(thinkBlocks.length)
        blockHtml += thinkBlocks.map(b=>`<div class="log-think">${e(b)}</div>`).join('');

      if(toolLines.length)
        blockHtml += `<div class="log-section">${toolLines.map(tl=>`<div class="log-tool-line">${e(tl)}</div>`).join('')}</div>`;

      if(answerLines.length)
        blockHtml += `<div class="log-section" style="margin-top:10px"><span class="log-label a">A</span><span class="log-text">${e(answerLines.join(' '))}</span></div>`;

      if(refText)
        blockHtml += `<div class="log-section" style="font-size:11.5px"><span class="log-label r">ref</span><span class="log-text" style="color:var(--lime)">${e(refText)}</span></div>`;
      if(judgeRaw)
        blockHtml += `<div class="log-section" style="font-size:11px;font-family:var(--mono)"><span class="log-label j">judge raw</span><span style="color:var(--violet)">${e(judgeRaw)}</span></div>`;

      if(verdictLine){
        const vm = verdictLine.match(/^([✓✗~])\s+(\w+)\s+\(([^)]+)\)\s*—\s*judge:\s*(.*)$/);
        const vc = vm ? VMAP2[vm[1]]||'x' : 'x';
        const vLabel = vm ? vm[2] : verdictLine;
        const vTiming = vm ? vm[3] : '';
        const vJudge = vm ? vm[4] : '';
        blockHtml += `<div class="log-verdict ${vc}">
          <span class="log-verdict-badge">${e(vLabel)}</span>
          <div class="log-verdict-body">
            ${vJudge?`<div style="font-size:12px;margin-bottom:4px">${e(vJudge)}</div>`:''}
            ${judgeDetail?`<div class="log-verdict-judge"><span class="log-label j">judge</span>${e(judgeDetail)}</div>`:''}
          </div>
          <span class="log-timing">${e(vTiming)}</span>
        </div>`;
      }

      blockHtml += '</div>';
      html += blockHtml;
      continue;
    }

    // preamble / other lines (Preflight, MCP tools, loading, etc.)
    if(t){ html += `<div style="padding:2px 18px;font-family:var(--mono);font-size:11px;color:var(--dim)">${e(t)}</div>`; }
    i++;
  }
  return html;
}

/* ---------- corpus ---------- */
async function loadCorpus(){
  _loadedCorpusConfig = _activeConfig;
  const docs=await (await fetch('/api/corpus')).json();
  const list=$('#doclist'); list.innerHTML='';
  docs.forEach((doc,i)=>{
    const it=el('div','docitem'+(i===0?'':''));
    it.innerHTML=`<div class="t">${doc.title}</div><div class="m">${doc.file} · ${doc.words} words</div>`;
    it.onclick=async()=>{
      [...list.children].forEach(c=>c.classList.remove('sel')); it.classList.add('sel');
      const d=await (await fetch('/api/corpus/'+doc.file)).json();
      $('#docview').setAttribute('dir', isHebrew()?'rtl':'ltr');
      $('#docview').innerHTML=mdToHtml(d.text);
      $('#docview').scrollTop=0;
    };
    list.appendChild(it);
  });
}
function mdToHtml(md){
  const lines=md.split('\n'); let out=[], inTable=false;
  const flushTable=()=>{ if(inTable){out.push('</table>'); inTable=false;} };
  for(let line of lines){
    if(/^\|(.+)\|$/.test(line.trim())){
      const cells=line.trim().slice(1,-1).split('|').map(c=>c.trim());
      if(cells.every(c=>/^:?-+:?$/.test(c))) continue; // separator
      if(!inTable){out.push('<table>'); inTable=true; out.push('<tr>'+cells.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr>');}
      else out.push('<tr>'+cells.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>');
      continue;
    }
    flushTable();
    if(line.startsWith('### ')) out.push('<h3>'+inline(line.slice(4))+'</h3>');
    else if(line.startsWith('## ')) out.push('<h2>'+inline(line.slice(3))+'</h2>');
    else if(line.startsWith('# ')) out.push('<h1>'+inline(line.slice(2))+'</h1>');
    else if(line.startsWith('- ')) out.push('<li>'+inline(line.slice(2))+'</li>');
    else if(line.trim()==='') out.push('');
    else out.push('<p>'+inline(line)+'</p>');
  }
  flushTable();
  return out.join('\n');
}
function inline(s){return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/`(.+?)`/g,'<code>$1</code>');}

/* ---------- tabs ---------- */
$('#tabs').onclick=e=>{const b=e.target.closest('button'); if(!b)return;
  [...$('#tabs').children].forEach(x=>x.classList.remove('active')); b.classList.add('active');
  ['control','leaderboard','questions','corpus'].forEach(t=>$('#'+t).classList.add('hidden'));
  const tab=b.dataset.tab; $('#'+tab).classList.remove('hidden');
  if(tab==='questions'){ loadPartialRuns().then(renderRunsList); }
  if(tab==='corpus'){
    if(!$('#doclist').children.length || _loadedCorpusConfig!==_activeConfig) loadCorpus();
  }
};

/* ---------- config / language switcher ---------- */
async function loadConfigs(){
  try{
    const c = await (await fetch('/api/configs')).json();
    _activeConfig = c.active;
    const btns = $('#langbtns'); btns.innerHTML='';
    for(const opt of c.options){
      const b = el('button', null, CFG_LABEL[opt]||opt);
      b.style.cssText='font-family:var(--mono);font-size:11px;letter-spacing:.08em;padding:5px 10px;cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--dim);transition:.15s';
      if(opt===c.active){b.style.background='var(--amber)';b.style.color='#0a0b0e';b.style.borderColor='var(--amber)';}
      b.onclick=async()=>{
        if(streaming){toast('stop the run first');return;}
        await fetch('/api/configs/'+opt,{method:'POST'});
        // full client-side reset so nothing leaks across benchmarks
        RUNCACHE={}; QCACHE=null; _loadedCorpusConfig=null; window.__partialLogs=[];
        $('#doclist').innerHTML='';
        $('#docview').innerHTML='<div class="empty">Select a document</div>';
        $('#runslist').innerHTML='';
        $('#lbbody').innerHTML='';
        await loadConfigs(); await loadState(); updateHint();
        // switch to Control tab so model list is immediately visible
        [...$('#tabs').children].forEach(x=>x.classList.remove('active'));
        $('[data-tab="control"]').classList.add('active');
        ['control','leaderboard','questions','corpus'].forEach(t=>$('#'+t).classList[t==='control'?'remove':'add']('hidden'));
        toast('Switched to '+(CFG_LABEL[opt]||opt));
      };
      btns.appendChild(b);
    }
  }catch(e){}
}

(async function init(){
  await loadConfigs(); await loadState(); updateHint();
  if(STATE.run_status==='running'){ setConsTag('running','run'); $('#launch').disabled=true; streamRun(); }
})();
