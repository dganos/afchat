# afchat_lab — Hebrew benchmark configuration
# Goal: evaluate models on Hebrew QA over translated EU transportation docs.

paths:
  corpus_dir: corpus_he
  testset: testset/questions_he.json
  results_dir: results_he
  lmstudio_mcp_json: ~/.lmstudio/mcp.json
  mcp_server_name: filesystem

lmstudio:
  base_url: http://localhost:1234/v1
  api_key: lm-studio
  request_timeout_s: 180
  manage_models: true
  context_length: 8192

agent:
  max_steps: 8
  temperature: 0
  max_tool_result_chars: 6000
  tool_allowlist:
    - list_directory
    - read_text_file
    - search_files

judge:
  model: claude-sonnet-4-6

# Hebrew-capable candidate models.
# DictaLM 2.0 dropped: no tool-calling support (Mistral/Zephyr template, user/assistant
# roles only). DictaLM 3.0 line adds native tool-calling (Hermes parser).
models:
  - id: dictalm-3.0-1.7b-instruct
    label: dictalm3-1.7b
  - id: dictalm-3.0-nemotron-12b-instruct
    label: dictalm3-12b
  - id: google/gemma-4-e4b
    label: gemma-4-e4b
  - id: qwen/qwen3-4b
    label: qwen3-4b
