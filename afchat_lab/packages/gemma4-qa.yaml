# ─────────────────────────────────────────────────────────────────────────────
# Agent package: a self-contained bundle of  MODEL + SYSTEM PROMPT + TOOLS
# (plus the runtime knobs they were tuned with).
#
# A "package" is everything needed to reproduce one agent's behaviour. This one is
# the QA-over-documents agent we converged on in afchat_lab: gemma-4-e4b driven as
# a tool-using agent that navigates a document corpus via read-only filesystem
# tools. With this exact prompt + tool set + runtime, gemma-4-e4b reached ~90% on
# the Hebrew benchmark (up from 66.7% before the long-document handling was fixed).
#
# Load it with harness.package.load_package(); see that module for the schema.
# ─────────────────────────────────────────────────────────────────────────────

name: gemma4-qa
version: 1
description: >
  QA over a document corpus. The model is not handed the documents — it must use
  filesystem tools to find and read the right file, then answer, grounded in the text.

# ── MODEL ────────────────────────────────────────────────────────────────────
model:
  id: google/gemma-4-e4b        # identifier from `lms ls` (LM Studio)
  label: gemma-4-e4b
  # Load-time settings. context_length must hold a whole corpus doc (~6-8k tokens)
  # plus the prompt and the model's reasoning, or read_text_file output overflows.
  context_length: 16384
  # gpu: max                    # optional LM Studio offload override (off|max|0..1)

# ── RUNTIME ──────────────────────────────────────────────────────────────────
# The agent-loop knobs. max_tool_result_chars is sized to fit the largest corpus
# doc in a single read so the answer span is never silently truncated away.
runtime:
  temperature: 0
  max_steps: 8
  max_tool_result_chars: 16000

# ── TOOLS ────────────────────────────────────────────────────────────────────
# Read-only filesystem tools. The harness is the MCP host: it resolves each tool's
# JSON schema from the live filesystem MCP server at runtime and exposes only this
# allowlist to the model (pointed read-only at the corpus directory).
tools:
  - name: list_directory
    description: List the files available in the corpus directory.
  - name: read_text_file
    description: >
      Read a document's text. Output is capped at max_tool_result_chars; if cut, it
      ends with a visible [TRUNCATED: showed X of Y chars ...] marker telling the
      model the rest of the file was not shown.
  - name: search_files
    description: >
      Search for text INSIDE files (content match, not file names) to locate the
      passage that holds a fact — by a number, unit, country, or specific term.

# ── SYSTEM PROMPT ────────────────────────────────────────────────────────────
# The prompt converged on in afchat_lab, generalized to be domain-agnostic so the
# same package works over any document corpus (the workflow / long-document /
# grounding guidance is what drove gemma-4-e4b from 66.7% to ~90%).
system_prompt: |
  You answer questions using ONLY the documents available through your tools. The documents live in the allowed corpus directory; their file names indicate their topic.

  Workflow:
  1. Call list_directory on the corpus directory to see the available files.
  2. Pick the file whose name best matches the question and call read_text_file on it.
  3. Find the specific fact and give a short, direct final answer.

  Finding facts in long documents:
  - Documents can be long and a single read may be cut short. If a tool result ends with a [TRUNCATED ...] notice, the rest of that file was NOT shown to you.
  - search_files matches text INSIDE files, not file names. When the fact is not in the part you have read, call search_files with a concrete keyword from the question — a number, a unit, a name, or a specific term — to locate the right passage, then read around it.
  - Do NOT conclude that the information is missing until you have read the WHOLE relevant file (keep reading or search the file first). Prefer searching over giving up.

  Rules: ground every answer in the documents. Do not invent facts. Answer in the SAME language as the question. When you know the answer, reply with the final answer as plain text and stop calling tools. Keep the final answer concise (one or two sentences with the exact numbers/terms).
